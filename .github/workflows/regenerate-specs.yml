name: Monitor & Regenerate NACHA Specifications

on:
  push:
    paths:
      - 'specs/official/**'
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'specs/official/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  regenerate-specs:
    runs-on: ubuntu-latest
    name: Regenerate Specifications
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for accurate change detection
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Run Specification Regenerator
        id: regenerate
        run: |
          python scripts/regenerate_specs.py
          echo "regeneration_status=success" >> $GITHUB_OUTPUT
      
      - name: Create Alert Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: spec-regeneration-report
          path: specs/.versions/ALERT_*.txt
          retention-days: 30
      
      - name: Display Alert Summary
        if: success()
        run: |
          echo "::group::📋 Specification Regeneration Summary"
          if [ -f "$(ls -t specs/.versions/ALERT_*.txt 2>/dev/null | head -1)" ]; then
            cat "$(ls -t specs/.versions/ALERT_*.txt | head -1)"
          fi
          echo "::endgroup::"
      
      - name: Check for Changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain specs/yml/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request (if changes on PR)
        if: github.event_name == 'pull_request' && steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: |
            chore: regenerated NACHA specification files
            
            Automatic regeneration triggered by changes to specs/official/
          branch: feature/regen-specs-${{ github.event.number }}
          delete-branch: true
          title: "📋 Regenerate NACHA specifications"
          body: |
            Automated regeneration of NACHA configuration files triggered by changes to specifications.
            
            **Generated by:** Specification Regeneration Workflow
            **Trigger:** Changes in `specs/official/`
            
            Please review the generated files before merging.
          labels: |
            documentation
            automated
      
      - name: Commit Changes (if on main branch)
        if: github.ref == 'refs/heads/main' && steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specs/yml/ specs/.versions/ specs/versioned/
          git commit -m "chore: regenerated NACHA specification files

          Automatic regeneration triggered by changes in specs/official/
          See specs/.versions/version_history.json for version details."
          git push
      
      - name: Create GitHub Release (on major version bump)
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const versionFile = 'specs/yml/VERSION';
            
            if (fs.existsSync(versionFile)) {
              const content = fs.readFileSync(versionFile, 'utf8');
              const versionMatch = content.match(/Current Version: ([\d.]+)/);
              
              if (versionMatch) {
                const version = versionMatch[1];
                const alertFile = Array.from(
                  fs.readdirSync('specs/.versions')
                ).filter(f => f.startsWith('ALERT_')).pop();
                
                if (version.endsWith('.0.0')) {  // Major version
                  const summary = fs.readFileSync(`specs/.versions/${alertFile}`, 'utf8');
                  
                  await github.rest.repos.createRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    tag_name: `specs-v${version}`,
                    name: `NACHA Specifications v${version}`,
                    body: summary.split('\n').slice(0, 20).join('\n'),
                    draft: false,
                    prerelease: false
                  });
                }
              }
            }
      
      - name: Post Slack Notification (optional)
        if: failure() && secrets.SLACK_WEBHOOK
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "⚠️ NACHA Specification Regeneration Alert",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Specification Regeneration Failed*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

  validate-specs:
    needs: regenerate-specs
    runs-on: ubuntu-latest
    name: Validate Generated Specifications
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Validate YAML Files
        run: |
          echo "Validating YAML specifications..."
          python -c "
          import yaml
          import glob
          
          errors = []
          for yml_file in glob.glob('specs/yml/*.yml'):
              try:
                  with open(yml_file, 'r') as f:
                      yaml.safe_load(f)
                  print(f'✓ {yml_file}')
              except yaml.YAMLError as e:
                  errors.append(f'✗ {yml_file}: {str(e)}')
          
          if errors:
              print('\nErrors found:')
              for error in errors:
                  print(error)
              exit(1)
          else:
              print('\n✅ All YAML files are valid!')
          "

  notify-success:
    needs: [regenerate-specs, validate-specs]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Post Success Message
        run: |
          echo "::notice title=✅ Specifications Updated::NACHA specifications have been successfully regenerated and validated. Check the artifacts for details."
